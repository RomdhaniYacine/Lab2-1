rules:
  - id: freemobile-no-md5
    patterns:
      - pattern: hashlib.md5(...)
    message: >
      [Free Mobile Security] MD5 est cassable par rainbow tables.
      Pour les mots de passe, utilisez hashlib.sha256 avec un sel ou bcrypt/argon2.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      owasp: "A02:2021 - Cryptographic Failures"
      references:
        - https://owasp.org/Top10/A02_2021-Cryptographic_Failures/

  - id: freemobile-no-eval
    pattern: eval(...)
    message: >
      [Free Mobile Security] eval() sur des données utilisateur = Remote Code Execution.
      Utilisez ast.literal_eval() pour les types simples, ou une whitelist explicite.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      owasp: "A03:2021 - Injection"
      cwe: CWE-95
